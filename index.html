<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OTS Family Money Story Interview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    :root {
      --bg: #0c0c0c;
      --surface: #111111;
      --border: #1e1e1e;
      --border-light: #2a2a2a;
      --text-primary: #e8e4dc;
      --text-secondary: #8a8480;
      --text-muted: #4a4744;
      --accent: #c9a96e;
      --accent-dim: #8a7248;
      --agent-bg: #111111;
      --user-color: #5a5450;
      --font-serif: 'Cormorant Garamond', Georgia, serif;
      --font-sans: 'Montserrat', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-serif);
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* HEADER */
    .site-header {
      width: 100%;
      max-width: 820px;
      padding: 40px 40px 0;
      text-align: center;
    }

    .site-header .eyebrow {
      font-family: var(--font-sans);
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--accent-dim);
      margin-bottom: 14px;
    }

    .site-header h1 {
      font-family: var(--font-serif);
      font-size: 28px;
      font-weight: 300;
      letter-spacing: 0.04em;
      color: var(--text-primary);
      line-height: 1.2;
    }

    .header-rule {
      width: 40px;
      height: 1px;
      background: var(--accent);
      margin: 20px auto 0;
      opacity: 0.5;
    }

    /* CHAT CONTAINER */
    .chat-container {
      width: 100%;
      max-width: 820px;
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0 40px 0;
    }

    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 36px 0;
      min-height: calc(100vh - 260px);
      max-height: calc(100vh - 260px);
    }

    .messages-area::-webkit-scrollbar { width: 2px; }
    .messages-area::-webkit-scrollbar-track { background: transparent; }
    .messages-area::-webkit-scrollbar-thumb { background: var(--border-light); }

    /* MESSAGES */
    .message {
      margin-bottom: 32px;
      line-height: 1.85;
      animation: fadeUp 0.4s ease forwards;
      opacity: 0;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.agent {
      font-size: 17px;
      font-weight: 300;
      color: var(--text-primary);
      padding-right: 120px;
    }

    .message.user {
      font-size: 15px;
      font-style: italic;
      color: var(--user-color);
      padding-left: 120px;
      text-align: right;
    }

    .message.thinking {
      font-family: var(--font-sans);
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--text-muted);
      font-weight: 300;
    }

    .thinking-dots::after {
      content: '...';
      animation: dots 1.4s infinite;
    }

    @keyframes dots {
      0%, 20% { content: '.'; }
      40% { content: '..'; }
      60%, 100% { content: '...'; }
    }

    /* INPUT AREA */
    .input-area {
      border-top: 1px solid var(--border);
      padding: 24px 0 36px;
      display: flex;
      gap: 16px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border-light);
      color: var(--text-primary);
      font-family: var(--font-serif);
      font-size: 16px;
      font-weight: 300;
      line-height: 1.6;
      padding: 8px 0 12px;
      resize: none;
      min-height: 48px;
      max-height: 140px;
      transition: border-color 0.2s;
    }

    textarea:focus {
      outline: none;
      border-bottom-color: var(--accent-dim);
    }

    textarea::placeholder {
      color: var(--text-muted);
      font-style: italic;
    }

    .send-btn {
      background: transparent;
      border: 1px solid var(--border-light);
      color: var(--text-secondary);
      font-family: var(--font-sans);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 12px 20px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      margin-bottom: 4px;
    }

    .send-btn:hover {
      border-color: var(--accent-dim);
      color: var(--accent);
    }

    .send-btn:disabled {
      opacity: 0.25;
      cursor: not-allowed;
    }

    /* BLUEPRINT STYLES — rendered inside chat */
    .blueprint-container {
      background: #0f0f0f;
      border: 1px solid var(--border-light);
      border-left: 3px solid var(--accent);
      padding: 48px 52px;
      margin: 8px 0;
      font-family: var(--font-serif);
    }

    .blueprint-title {
      font-family: var(--font-sans);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 6px;
    }

    .blueprint-name {
      font-family: var(--font-serif);
      font-size: 26px;
      font-weight: 300;
      color: var(--text-primary);
      letter-spacing: 0.02em;
      margin-bottom: 4px;
    }

    .blueprint-date {
      font-family: var(--font-sans);
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      margin-bottom: 40px;
    }

    .blueprint-rule {
      border: none;
      border-top: 1px solid var(--border-light);
      margin: 32px 0;
    }

    .blueprint-section-header {
      font-family: var(--font-sans);
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--accent-dim);
      margin-bottom: 18px;
    }

    .blueprint-body {
      font-size: 16px;
      font-weight: 300;
      line-height: 1.9;
      color: #ccc8c0;
    }

    .blueprint-body em {
      font-style: italic;
      color: var(--text-primary);
    }

    .blueprint-quote {
      border-left: 2px solid var(--accent);
      margin: 24px 0 24px 20px;
      padding-left: 20px;
      font-style: italic;
      color: var(--text-primary);
      font-size: 17px;
      line-height: 1.8;
    }

    .blueprint-cry-quote {
      text-align: center;
      font-style: italic;
      font-size: 20px;
      font-weight: 300;
      color: var(--text-primary);
      line-height: 1.7;
      padding: 32px 40px;
      border-top: 1px solid var(--border-light);
      border-bottom: 1px solid var(--border-light);
      margin: 32px 0;
      letter-spacing: 0.01em;
    }

    .blueprint-signature {
      font-style: italic;
      color: var(--accent);
      font-size: 17px;
      margin-top: 40px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }

    .blueprint-cta {
      background: #0a0a0a;
      border: 1px solid var(--border-light);
      padding: 32px 36px;
      margin-top: 32px;
    }

    .blueprint-cta-heading {
      font-family: var(--font-sans);
      font-size: 9px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
    }

    .blueprint-cta a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid var(--accent-dim);
    }

    .blueprint-cta a:hover {
      border-bottom-color: var(--accent);
    }

    /* DOWNLOAD BUTTON */
    .download-btn {
      display: block;
      width: 100%;
      margin-top: 28px;
      background: transparent;
      border: 1px solid var(--accent-dim);
      color: var(--accent);
      font-family: var(--font-sans);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      padding: 16px;
      cursor: pointer;
      transition: all 0.25s;
      text-align: center;
    }

    .download-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: #0a0a0a;
    }

    /* PDF-specific styles — hidden div used for PDF generation */
    #pdf-blueprint {
      display: none;
      font-family: 'Georgia', serif;
      color: #1a1a1a;
      background: #fff;
      padding: 60px 70px;
      max-width: 800px;
    }

    #pdf-blueprint .pdf-header {
      border-bottom: 2px solid #1a1a1a;
      padding-bottom: 24px;
      margin-bottom: 40px;
    }

    #pdf-blueprint .pdf-eyebrow {
      font-family: 'Arial', sans-serif;
      font-size: 9px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #8a7248;
      margin-bottom: 10px;
    }

    #pdf-blueprint .pdf-title {
      font-size: 28px;
      font-weight: normal;
      letter-spacing: 0.02em;
      color: #1a1a1a;
      margin-bottom: 6px;
    }

    #pdf-blueprint .pdf-date {
      font-family: 'Arial', sans-serif;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: #888;
    }

    #pdf-blueprint .pdf-rule {
      border: none;
      border-top: 1px solid #ddd;
      margin: 28px 0;
    }

    #pdf-blueprint .pdf-section-label {
      font-family: 'Arial', sans-serif;
      font-size: 8px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #8a7248;
      margin-bottom: 14px;
    }

    #pdf-blueprint .pdf-body {
      font-size: 13px;
      line-height: 1.85;
      color: #2a2a2a;
    }

    #pdf-blueprint .pdf-quote {
      border-left: 2px solid #c9a96e;
      margin: 20px 0 20px 16px;
      padding-left: 16px;
      font-style: italic;
      color: #1a1a1a;
      font-size: 14px;
    }

    #pdf-blueprint .pdf-cry-quote {
      text-align: center;
      font-style: italic;
      font-size: 18px;
      color: #1a1a1a;
      padding: 28px 32px;
      border-top: 1px solid #ddd;
      border-bottom: 1px solid #ddd;
      margin: 28px 0;
      line-height: 1.7;
    }

    #pdf-blueprint .pdf-signature {
      font-style: italic;
      color: #8a7248;
      font-size: 14px;
      margin-top: 36px;
      padding-top: 20px;
      border-top: 1px solid #eee;
    }

    #pdf-blueprint .pdf-cta {
      background: #f9f7f4;
      border: 1px solid #e0d8cc;
      border-left: 3px solid #c9a96e;
      padding: 24px 28px;
      margin-top: 28px;
      font-size: 13px;
      line-height: 1.8;
    }

    #pdf-blueprint .pdf-footer {
      text-align: center;
      font-family: 'Arial', sans-serif;
      font-size: 8px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #bbb;
      margin-top: 48px;
      padding-top: 24px;
      border-top: 1px solid #eee;
    }
  </style>
</head>
<body>

  <header class="site-header">
    <p class="eyebrow">Outsmart the System</p>
    <h1>Family Money Story Interview</h1>
    <div class="header-rule"></div>
  </header>

  <div class="chat-container">
    <div class="messages-area" id="messagesArea">
      <div id="messages"></div>
    </div>

    <div class="input-area">
      <textarea
        id="userInput"
        placeholder="Type your answer here..."
        rows="2"
      ></textarea>
      <button class="send-btn" id="sendButton" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <!-- Hidden div used to generate PDF -->
  <div id="pdf-blueprint"></div>

  <script src="chat.js"></script>
</body>
</html>
