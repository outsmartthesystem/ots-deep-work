<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OTS Family Money Story Interview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      background-color: #0a0a0a;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 760px;
      display: flex;
      flex-direction: column;
      height: 92vh;
    }

    .header {
      text-align: center;
      padding: 20px 0 16px;
      border-bottom: 1px solid #1a1a1a;
    }

    .header h1 {
      font-size: 20px;
      font-weight: normal;
      letter-spacing: 0.08em;
      color: #ffffff;
    }

    .subtitle {
      font-size: 11px;
      color: #555;
      margin-top: 6px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 28px 0;
    }

    .messages {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .message {
      line-height: 1.85;
      font-size: 16px;
    }

    .message.agent {
      color: #ddd;
      padding-right: 80px;
    }

    .message.user {
      color: #666;
      padding-left: 80px;
      text-align: right;
      font-style: italic;
    }

    .message.thinking {
      color: #333;
      font-style: italic;
      font-size: 14px;
      letter-spacing: 0.1em;
    }

    .input-area {
      display: flex;
      gap: 12px;
      padding: 20px 0 0;
      align-items: flex-end;
      border-top: 1px solid #1a1a1a;
    }

    textarea {
      flex: 1;
      background: #0f0f0f;
      border: 1px solid #222;
      color: #e8e8e8;
      padding: 14px 16px;
      font-size: 15px;
      font-family: Georgia, serif;
      resize: none;
      border-radius: 3px;
      line-height: 1.6;
      min-height: 52px;
    }

    textarea:focus {
      outline: none;
      border-color: #3a3a3a;
    }

    textarea::placeholder {
      color: #333;
    }

    button {
      background: transparent;
      color: #888;
      border: 1px solid #2a2a2a;
      padding: 14px 22px;
      font-size: 13px;
      letter-spacing: 0.08em;
      cursor: pointer;
      border-radius: 3px;
      font-family: Georgia, serif;
      transition: all 0.2s;
      white-space: nowrap;
    }

    button:hover { color: #ccc; border-color: #444; }
    button:disabled { opacity: 0.3; cursor: not-allowed; }

    .chat-window::-webkit-scrollbar { width: 3px; }
    .chat-window::-webkit-scrollbar-track { background: transparent; }
    .chat-window::-webkit-scrollbar-thumb { background: #222; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Family Money Story Interview</h1>
      <p class="subtitle">Outsmart the System</p>
    </div>
    <div class="chat-window" id="chatWindow">
      <div class="messages" id="messages"></div>
    </div>
    <div class="input-area">
      <textarea id="userInput" placeholder="Type your answer here..." rows="2"></textarea>
      <button id="sendButton" onclick="sendMessage()">Send</button>
    </div>
  </div>
  <script src="chat.js"></script>
</body>
</html>
