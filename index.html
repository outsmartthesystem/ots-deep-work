<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OTS Family Money Story Interview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    :root {
      --bg: #0c0c0c;
      --surface: #111111;
      --border: #1e1e1e;
      --border-light: #2a2a2a;
      --text-primary: #e8e4dc;
      --text-secondary: #8a8480;
      --text-muted: #4a4744;
      --accent: #c9a96e;
      --accent-dim: #8a7248;
      --user-color: #5a5450;
      --font-serif: 'Cormorant Garamond', Georgia, serif;
      --font-sans: 'Montserrat', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-serif);
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── INTAKE SCREEN ─────────────────────────────── */
    #intake-screen {
      width: 100%;
      max-width: 560px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px 40px;
    }

    .intake-eyebrow {
      font-family: var(--font-sans);
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--accent-dim);
      margin-bottom: 20px;
      text-align: center;
    }

    .intake-title {
      font-family: var(--font-serif);
      font-size: 30px;
      font-weight: 300;
      letter-spacing: 0.03em;
      color: var(--text-primary);
      text-align: center;
      line-height: 1.3;
      margin-bottom: 12px;
    }

    .intake-subtitle {
      font-family: var(--font-serif);
      font-size: 16px;
      font-weight: 300;
      font-style: italic;
      color: var(--text-secondary);
      text-align: center;
      line-height: 1.7;
      margin-bottom: 48px;
    }

    .intake-rule {
      width: 40px;
      height: 1px;
      background: var(--accent);
      margin: 0 auto 48px;
      opacity: 0.4;
    }

    .intake-field {
      margin-bottom: 28px;
    }

    .intake-label {
      font-family: var(--font-sans);
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-muted);
      display: block;
      margin-bottom: 10px;
    }

    .intake-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border-light);
      color: var(--text-primary);
      font-family: var(--font-serif);
      font-size: 18px;
      font-weight: 300;
      padding: 8px 0 12px;
      transition: border-color 0.2s;
    }

    .intake-input:focus {
      outline: none;
      border-bottom-color: var(--accent-dim);
    }

    .intake-input::placeholder {
      color: var(--text-muted);
      font-style: italic;
    }

    .intake-note {
      font-family: var(--font-sans);
      font-size: 10px;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      line-height: 1.6;
      margin-top: 24px;
      text-align: center;
    }

    .intake-btn {
      width: 100%;
      margin-top: 36px;
      background: transparent;
      border: 1px solid var(--accent-dim);
      color: var(--accent);
      font-family: var(--font-sans);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      padding: 18px;
      cursor: pointer;
      transition: all 0.25s;
    }

    .intake-btn:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: #0a0a0a;
    }

    /* ── CHAT SCREEN ───────────────────────────────── */
    #chat-screen {
      display: none;
      width: 100%;
      max-width: 820px;
      flex-direction: column;
      height: 100vh;
      padding: 0 40px;
    }

    .site-header {
      text-align: center;
      padding: 32px 0 16px;
      border-bottom: 1px solid var(--border);
    }

    .site-header .eyebrow {
      font-family: var(--font-sans);
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--accent-dim);
      margin-bottom: 10px;
    }

    .site-header h1 {
      font-family: var(--font-serif);
      font-size: 22px;
      font-weight: 300;
      letter-spacing: 0.04em;
      color: var(--text-primary);
    }

    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 36px 0;
    }

    .messages-area::-webkit-scrollbar { width: 2px; }
    .messages-area::-webkit-scrollbar-track { background: transparent; }
    .messages-area::-webkit-scrollbar-thumb { background: var(--border-light); }

    .message {
      margin-bottom: 32px;
      line-height: 1.85;
      animation: fadeUp 0.4s ease forwards;
      opacity: 0;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.agent {
      font-size: 17px;
      font-weight: 300;
      color: var(--text-primary);
      padding-right: 120px;
    }

    .message.user {
      font-size: 15px;
      font-style: italic;
      color: var(--user-color);
      padding-left: 120px;
      text-align: right;
    }

    .message.thinking {
      font-family: var(--font-sans);
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--text-muted);
    }

    .thinking-dots::after {
      content: '...';
      animation: dots 1.4s infinite;
    }

    @keyframes dots {
      0%, 20% { content: '.'; }
      40% { content: '..'; }
      60%, 100% { content: '...'; }
    }

    .input-area {
      border-top: 1px solid var(--border);
      padding: 24px 0 36px;
      display: flex;
      gap: 16px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border-light);
      color: var(--text-primary);
      font-family: var(--font-serif);
      font-size: 16px;
      font-weight: 300;
      padding: 8px 0 12px;
      resize: none;
      min-height: 48px;
      max-height: 140px;
      transition: border-color 0.2s;
    }

    textarea:focus { outline: none; border-bottom-color: var(--accent-dim); }
    textarea::placeholder { color: var(--text-muted); font-style: italic; }

    .send-btn {
      background: transparent;
      border: 1px solid var(--border-light);
      color: var(--text-secondary);
      font-family: var(--font-sans);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 12px 20px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      margin-bottom: 4px;
    }

    .send-btn:hover { border-color: var(--accent-dim); color: var(--accent); }
    .send-btn:disabled { opacity: 0.25; cursor: not-allowed; }

    /* ── BLUEPRINT STYLES ──────────────────────────── */
    .blueprint-container {
      background: #0f0f0f;
      border: 1px solid var(--border-light);
      border-left: 3px solid var(--accent);
      padding: 48px 52px;
      margin: 8px 0;
      font-family: var(--font-serif);
    }

    .blueprint-title {
      font-family: var(--font-sans);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 6px;
    }

    .blueprint-name {
      font-family: var(--font-serif);
      font-size: 26px;
      font-weight: 300;
      color: var(--text-primary);
      letter-spacing: 0.02em;
      margin-bottom: 4px;
    }

    .blueprint-date {
      font-family: var(--font-sans);
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      margin-bottom: 40px;
    }

    .blueprint-rule {
      border: none;
      border-top: 1px solid var(--border-light);
      margin: 32px 0;
    }

    .blueprint-section-header {
      font-family: var(--font-sans);
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--accent-dim);
      margin-bottom: 18px;
    }

    .blueprint-body {
      font-size: 16px;
      font-weight: 300;
      line-height: 1.9;
      color: #ccc8c0;
    }

    .blueprint-body em { font-style: italic; color: var(--text-primary); }

    .blueprint-quote {
      border-left: 2px solid var(--accent);
      margin: 24px 0 24px 20px;
      padding-left: 20px;
      font-style: italic;
      color: var(--text-primary);
      font-size: 17px;
      line-height: 1.8;
    }

    .blueprint-cry-quote {
      text-align: center;
      font-style: italic;
      font-size: 20px;
      font-weight: 300;
      color: var(--text-primary);
      line-height: 1.7;
      padding: 32px 40px;
      border-top: 1px solid var(--border-light);
      border-bottom: 1px solid var(--border-light);
      margin: 32px 0;
    }

    .blueprint-signature {
      font-style: italic;
      color: var(--accent);
      font-size: 17px;
      margin-top: 40px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }

    .blueprint-cta {
      background: #0a0a0a;
      border: 1px solid var(--border-light);
      padding: 32px 36px;
      margin-top: 32px;
    }

    .blueprint-cta-heading {
      font-family: var(--font-sans);
      font-size: 9px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
    }

    .blueprint-cta a { color: var(--accent); text-decoration: none; border-bottom: 1px solid var(--accent-dim); }

    .download-btn {
      display: block;
      width: 100%;
      margin-top: 28px;
      background: transparent;
      border: 1px solid var(--accent-dim);
      color: var(--accent);
      font-family: var(--font-sans);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      padding: 16px;
      cursor: pointer;
      transition: all 0.25s;
      text-align: center;
    }

    .download-btn:hover { background: var(--accent); border-color: var(--accent); color: #0a0a0a; }

    /* ── PDF STYLES ────────────────────────────────── */
    #pdf-blueprint {
      display: none;
      font-family: 'Georgia', serif;
      color: #1a1a1a;
      background: #fff;
      padding: 60px 70px;
      max-width: 800px;
    }

    #pdf-blueprint .pdf-header { border-bottom: 2px solid #1a1a1a; padding-bottom: 24px; margin-bottom: 40px; }
    #pdf-blueprint .pdf-eyebrow { font-family: Arial, sans-serif; font-size: 9px; letter-spacing: 0.35em; text-transform: uppercase; color: #8a7248; margin-bottom: 10px; }
    #pdf-blueprint .pdf-title { font-size: 28px; font-weight: normal; color: #1a1a1a; margin-bottom: 6px; }
    #pdf-blueprint .pdf-date { font-family: Arial, sans-serif; font-size: 10px; letter-spacing: 0.1em; color: #888; }
    #pdf-blueprint .pdf-rule { border: none; border-top: 1px solid #ddd; margin: 28px 0; }
    #pdf-blueprint .pdf-section-label { font-family: Arial, sans-serif; font-size: 8px; letter-spacing: 0.35em; text-transform: uppercase; color: #8a7248; margin-bottom: 14px; }
    #pdf-blueprint .pdf-body { font-size: 13px; line-height: 1.85; color: #2a2a2a; }
    #pdf-blueprint .pdf-quote { border-left: 2px solid #c9a96e; margin: 20px 0 20px 16px; padding-left: 16px; font-style: italic; color: #1a1a1a; font-size: 14px; }
    #pdf-blueprint .pdf-cry-quote { text-align: center; font-style: italic; font-size: 18px; color: #1a1a1a; padding: 28px 32px; border-top: 1px solid #ddd; border-bottom: 1px solid #ddd; margin: 28px 0; line-height: 1.7; }
    #pdf-blueprint .pdf-signature { font-style: italic; color: #8a7248; font-size: 14px; margin-top: 36px; padding-top: 20px; border-top: 1px solid #eee; }
    #pdf-blueprint .pdf-cta { background: #f9f7f4; border: 1px solid #e0d8cc; border-left: 3px solid #c9a96e; padding: 24px 28px; margin-top: 28px; font-size: 13px; line-height: 1.8; }
    #pdf-blueprint .pdf-footer { text-align: center; font-family: Arial, sans-serif; font-size: 8px; letter-spacing: 0.2em; text-transform: uppercase; color: #bbb; margin-top: 48px; padding-top: 24px; border-top: 1px solid #eee; }
  </style>
</head>
<body>

  <!-- INTAKE SCREEN -->
  <div id="intake-screen">
    <p class="intake-eyebrow">Outsmart the System</p>
    <h1 class="intake-title">Family Money Story Interview</h1>
    <p class="intake-subtitle">A mirror, not a quiz.<br>This hour could change what your kids inherit.</p>
    <div class="intake-rule"></div>

    <div class="intake-field">
      <label class="intake-label" for="inputName">Your First Name</label>
      <input class="intake-input" type="text" id="inputName" placeholder="First name only" autocomplete="given-name">
    </div>

    <div class="intake-field">
      <label class="intake-label" for="inputEmail">Your Email</label>
      <input class="intake-input" type="email" id="inputEmail" placeholder="Where we'll send your Blueprint" autocomplete="email">
    </div>

    <button class="intake-btn" onclick="startSession()">Begin the Interview</button>

    <p class="intake-note">Your answers stay private. This is not a sales funnel.<br>It is 60 to 90 minutes of honest work.</p>
  </div>

  <!-- CHAT SCREEN -->
  <div id="chat-screen">
    <header class="site-header">
      <p class="eyebrow">Outsmart the System</p>
      <h1 id="chat-heading">Family Money Story Interview</h1>
    </header>

    <div class="messages-area" id="messagesArea">
      <div id="messages"></div>
    </div>

    <div class="input-area">
      <textarea id="userInput" placeholder="Type your answer here..." rows="2"></textarea>
      <button class="send-btn" id="sendButton" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <div id="pdf-blueprint"></div>

  <script src="chat.js"></script>
</body>
</html>
